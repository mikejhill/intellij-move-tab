name: Build and Verify Plugin

on:
  push:
    branches: ['*']
    tags-ignore: ['*']
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: ['*']
  merge_group:

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23.0.0
        with:
          globs: '**/*.md'

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build
        env:
          CI: true
        run: |
          ./gradlew check verifyPlugin
      - name: Predict Next Version
        id: semrel
        shell: bash
        run: |
          curl -L -o semrel https://registry.go-semantic-release.xyz/downloads/linux/amd64/semantic-release
          chmod +x semrel
          ./semrel --version-file --changelog .generated-go-semantic-release-changelog.md --token ${{ secrets.GITHUB_TOKEN }} --dry --allow-no-changes --no-ci 2>&1 | tee semrel.log
          # In --dry mode, semrel logs the version but may not write .version-unreleased.
          # Try the file first, then fall back to parsing the log.
          if [ -f .version-unreleased ]; then
              version=$(cat .version-unreleased)
              rm .version-unreleased
          else
              version=$(grep -m1 -oP 'new version: \K[0-9]+\.[0-9]+\.[0-9]+' semrel.log || true)
          fi
          previous=$(grep -m1 -oP 'found version: \K[^ ]+' semrel.log || true)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"
      - name: Show Predicted Version
        run: |
          echo "### Predicted Release Version" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          version="${{ steps.semrel.outputs.version }}"
          if [ -z "$version" ]; then
              version="${{ steps.semrel.outputs.previous }} (insufficient changes for new version)"
          fi
          echo "Next release version if created from this commit: **$version**" >> "$GITHUB_STEP_SUMMARY"

  ci-pass:
    if: always()
    needs: [commit-lint, markdown, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required jobs were cancelled"
            exit 1
          fi
