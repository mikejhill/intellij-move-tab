name: Release and Publish

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Validate the release without creating tags or publishing'
        type: boolean
        default: false
      force-patch:
        description: 'Force a patch bump when no releasable commits exist'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/master'
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Determine next version
        id: semrel
        uses: go-semantic-release/action@v1.24.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          force-bump-patch-version: ${{ inputs.force-patch }}
          dry: true

      - name: Require version bump
        id: version
        shell: bash
        run: |
          version="${{ steps.semrel.outputs.version }}"
          if [ -z "$version" ] && [ -f .version-unreleased ]; then
            version=$(cat .version-unreleased)
          fi
          if [ -z "$version" ]; then
            echo "::error::No releasable commits found. Use force-patch or add feat:/fix: commits."
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "### Release Version: $version" >> "$GITHUB_STEP_SUMMARY"

      - name: Validate CHANGELOG
        shell: bash
        run: |
          grep -q "^## \[Unreleased\]" CHANGELOG.md || {
            echo "::error::CHANGELOG.md missing [Unreleased] section"
            exit 1
          }

      - name: Promote CHANGELOG
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          DATE=$(date -u +%Y-%m-%d)
          sed -i "s/^## \[Unreleased\]$/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md
          grep -q "## \[$VERSION\]" CHANGELOG.md || {
            echo "::error::CHANGELOG.md promotion failed — version header not found after sed"
            exit 1
          }
          echo "Promoted [Unreleased] → [$VERSION] - $DATE"

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and Verify
        env:
          CI: true
        run: ./gradlew check verifyPlugin -PpluginVersion=${{ steps.version.outputs.value }}

      - name: Dry-run summary
        if: inputs.dry-run == true
        shell: bash
        run: |
          echo "### Dry Run Complete ✓" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version **${{ steps.version.outputs.value }}** validated successfully." >> "$GITHUB_STEP_SUMMARY"
          echo "No tags, releases, or artifacts were created." >> "$GITHUB_STEP_SUMMARY"

      - name: Commit CHANGELOG and create tag
        if: inputs.dry-run != true
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD "v$VERSION"

      - name: Create GitHub Release
        if: inputs.dry-run != true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: build/distributions/*.zip

      - name: Attest build provenance
        if: inputs.dry-run != true
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/distributions/*.zip

  publish:
    needs: release
    if: inputs.dry-run != true
    name: Publish to JetBrains Marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    environment: jetbrains-marketplace
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: v${{ needs.release.outputs.version }}
      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Publish Plugin
        env:
          publishToken: ${{ secrets.JETBRAINS_HUB_TOKEN }}
        run: ./gradlew publishPlugin -PpluginVersion=${{ needs.release.outputs.version }}

