version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # These are transitive dependencies supplied by the IntelliJ platform;
      # they cannot be updated independently and security alerts are not actionable.
      - dependency-name: "com.fasterxml.jackson.core:jackson-core"
      - dependency-name: "io.undertow:undertow-core"
